<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛报名系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        h1 { color: #1e3c72; margin-bottom: 8px; font-size: 32px; }
        .subtitle { color: #666; margin-bottom: 40px; font-size: 16px; }
        .icon { font-size: 64px; margin-bottom: 24px; }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 16px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            text-decoration: none;
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline {
            background: transparent;
            border: 2px solid #1e3c72;
            color: #1e3c72;
        }
        .features { margin-top: 32px; text-align: left; }
        .feature { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .feature-icon { font-size: 24px; }
        .feature-text { color: #333; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🏆</div>
        <h1>比赛报名系统</h1>
        <p class="subtitle">请先登录后再进行报名</p>
        
        <a href="login.html" class="btn">登录 / 注册</a>
        <a href="dashboard.html" class="btn btn-outline">进入后台</a>
        
        <div class="features">
            <div class="feature">
                <span class="feature-icon">👤</span>
                <span class="feature-text">教练账号管理，名额自主可控</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📅</span>
                <span class="feature-text">报名时间限制，逾期自动截止</span>
            </div>
            <div class="feature">
                <span class="feature-icon">✏️</span>
                <span class="feature-text">报名期间可随时修改信息</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📊</span>
                <span class="feature-text">数据导出方便，管理更高效</span>
            </div>
        </div>
    </div>
</body>
</html>
