<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛报名系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        label .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            display: none;
            text-align: center;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 比赛报名</h1>
        <p class="subtitle">请填写以下信息完成报名</p>
        
        <form id="registrationForm">
            <div class="form-row">
                <div class="form-group">
                    <label>姓名 <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required placeholder="请输入选手姓名">
                </div>
                
                <div class="form-group">
                    <label>性别 <span class="required">*</span></label>
                    <select id="gender" name="gender" required>
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>代表队 <span class="required">*</span></label>
                <input type="text" id="team" name="team" required placeholder="请输入所属代表队名称">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>参赛项目 <span class="required">*</span></label>
                    <select id="project" name="project" required>
                        <option value="">请选择参赛项目</option>
                        <option value="项目A">项目A</option>
                        <option value="项目B">项目B</option>
                        <option value="项目C">项目C</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>大组别 <span class="required">*</span></label>
                    <select id="bigGroup" name="bigGroup" required>
                        <option value="">请选择大组别</option>
                        <option value="少年组">少年组</option>
                        <option value="青年组">青年组</option>
                        <option value="成年组">成年组</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>小组别</label>
                <input type="text" id="smallGroup" name="smallGroup" placeholder="请输入小组别（如有）">
            </div>
            
            <div class="form-group">
                <label>参赛类型</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="mixedTeam" name="mixedTeam">
                        <label for="mixedTeam" style="margin:0;">混团</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="teamEvent" name="teamEvent">
                        <label for="teamEvent" style="margin:0;">团体</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="mqs" name="mqs">
                        <label for="mqs" style="margin:0;">MQS</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>联系电话</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入联系电话">
            </div>
            
            <div class="form-group">
                <label>备注</label>
                <textarea id="remarks" name="remarks" placeholder="如有其他需要说明的信息请填写" rows="3"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">提交报名</button>
        </form>
        
        <div class="message success" id="successMessage">
            <strong>✅ 报名成功！</strong><br>
            感谢您的参与，请保持电话畅通。
        </div>
        
        <div class="message error" id="errorMessage">
            <strong>❌ 提交失败</strong><br>
            <span id="errorDetail"></span>
        </div>
        
        <div class="footer">
            主办方保留最终解释权
        </div>
    </div>
    
    <script>
        // 表单提交处理
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('.submit-btn');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            const errorDetail = document.getElementById('errorDetail');
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            // 收集表单数据
            const formData = {
                name: document.getElementById('name').value.trim(),
                gender: document.getElementById('gender').value,
                team: document.getElementById('team').value.trim(),
                project: document.getElementById('project').value,
                bigGroup: document.getElementById('bigGroup').value,
                smallGroup: document.getElementById('smallGroup').value.trim(),
                mixedTeam: document.getElementById('mixedTeam').checked,
                teamEvent: document.getElementById('teamEvent').checked,
                mqs: document.getElementById('mqs').checked,
                phone: document.getElementById('phone').value.trim(),
                remarks: document.getElementById('remarks').value.trim(),
                submitTime: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }),
                registrationId: 'REG' + Date.now()
            };
            
            try {
                // 发送到后端API
                const response = await fetch('/.netlify/functions/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    this.reset();
                } else {
                    throw new Error(result.message || '提交失败');
                }
            } catch (error) {
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                errorDetail.textContent = error.message || '网络错误，请稍后重试';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交报名';
            }
        });
        
        // 动态加载参赛项目（可从后端获取）
        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');
                const projects = await response.json();
                const select = document.getElementById('project');
                select.innerHTML = '<option value="">请选择参赛项目</option>';
                projects.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p;
                    option.textContent = p;
                    select.appendChild(option);
                });
            } catch (e) {
                console.log('使用默认项目列表');
            }
        }
        
        // 页面加载时可动态加载项目
        // loadProjects();
    </script>
</body>
</html>
