<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 比赛报名系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }
        h1 { text-align: center; color: #1e3c72; margin-bottom: 8px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #666; font-size: 14px; }
        .tab.active { color: #1e3c72; border-bottom: 2px solid #1e3c72; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #1e3c72; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .message.error { background: #ffebee; color: #c62828; }
        .message.success { background: #e8f5e9; color: #2e7d32; }
        .links { text-align: center; margin-top: 20px; font-size: 14px; }
        .links a { color: #1e3c72; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 比赛报名系统</h1>
        <p class="subtitle">教练账号登录</p>
        
        <div class="message error" id="errorMsg"></div>
        <div class="message success" id="successMsg"></div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">登录</div>
            <div class="tab" onclick="showTab('register')">注册</div>
        </div>
        
        <!-- 登录表单 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        
        <!-- 注册表单 -->
        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>姓名 <span style="color:#e74c3c">*</span></label>
                <input type="text" id="regName" required placeholder="请输入真实姓名">
            </div>
            <div class="form-group">
                <label>用户名 <span style="color:#e74c3c">*</span></label>
                <input type="text" id="regUsername" required placeholder="至少3位字符">
            </div>
            <div class="form-group">
                <label>密码 <span style="color:#e74c3c">*</span></label>
                <input type="password" id="regPassword" required placeholder="至少6位字符">
            </div>
            <div class="form-group">
                <label>联系电话</label>
                <input type="tel" id="regPhone" placeholder="选填">
            </div>
            <button type="submit" class="btn">注册</button>
        </form>
    </div>
    
    <script>
        const API = '/.netlify/functions/api';
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            if (tab === 'login') event.target.classList.add('active');
            else event.target.classList.add('active');
            document.querySelectorAll('.tab')[tab === 'login' ? 0 : 1].classList.add('active');
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value.trim(),
                        password: document.getElementById('loginPassword').value
                    })
                });
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    showError(errData.message || `服务器错误 (${res.status})`);
                    btn.disabled = false;
                    btn.textContent = '登录';
                    return;
                }
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showSuccess('登录成功！即将跳转...');
                    const target = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
                    setTimeout(() => window.location.href = target, 1000);
                } else {
                    showError(data.message || '登录失败');
                }
            } catch (err) {
                showError('网络连接失败，请检查网络后重试 (' + err.message + ')');
                console.error('Login error:', err);
            }
            
            btn.disabled = false;
            btn.textContent = '登录';
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('regName').value.trim(),
                        username: document.getElementById('regUsername').value.trim(),
                        password: document.getElementById('regPassword').value,
                        phone: document.getElementById('regPhone').value.trim()
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showSuccess('注册成功！即将跳转...');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showError(data.message || '注册失败');
                }
            } catch (err) {
                showError('网络错误，请稍后重试');
            }
            
            btn.disabled = false;
            btn.textContent = '注册';
        }
    </script>
</body>
</html>
